      summary: Get a specific Player
      operationId: Get a specific Player
      description: >-
        Return the Player corresponding to the given database / player username
        couple.


        ::: note


        #### Server-side caching


        This resource has a cache lifetime of **1 hour**.

        :::
      tags:
        - Players
      parameters:
        - name: database
          in: path
          description: The player database.
          required: true
          x-example: invasion
          type: string
          enum:
            - invasion
            - pacific
        - name: username
          in: path
          description: The player username.
          required: true
          x-example: EPOCDOTFR
          type: string
        - name: date
          in: query
          description: >-
            [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) date for which to
            retrieve the stats for.


            Note the player must be part of the 5000 most experienced players
            for its stats history to be recorded.
          required: false
          x-example: '2018-11-30'
          type: string
      produces:
        - application/json
      consumes: []
