swagger: '2.0'
info:
  title: Running With Rifles Stats REST API
  version: ''
  description: >-
    Documentation about the [Running With Rifles Stats
    (RWRS)](https://rwrstats.com/) REST API. [About
    RWRS](https://rwrstats.com/about)


    ::: note

    The RWRS REST API is provided "as is", without warranty of any kind, express
    or implied.

    :::


    ::: warning

    You are **required** to mention somewhere in your project - in a visible
    manner - that you're using the RWRS REST API.

    Not doing so may lead to a ban from using the API.

    :::


    ## Getting a Personal Access Token


    Although this API is public, a Personal Access Token is **required** to
    prevent abuses. To obtain a Personal Access

    Token:


    1. Create an RWRS account by [signing in using your Steam
    account](https://rwrstats.com/sign-in)


    2. Get your Personal Access Token by heading to [your settings
    page](https://rwrstats.com/settings#pat)


    ## Sending the Personal Access Token


    All endpoints needs a valid Personal Access Token, otherwise a
    [403](https://httpstatuses.io/403) HTTP status code

    will be returned. Send this HTTP header in all of your HTTP requests along
    your Personal Access Token:


    ```http

    Authorization: Token {Your Personal Access Token}

    ```


    ## Base URL


    The RWRS REST API base URL is `https://rwrstats.com/api`.


    ::: note

    Using HTTPS is mandatory or you'll encounter redirections (which may not be
    appreciated by your HTTP client).

    :::


    ## Rate limiting


    To prevent abuse, all resources are rate-limited. Each IP address + Personal
    Access Token couple is limited to **1 request per

    second**. Failing to respect this rate-limiting window will lead to a
    [429](https://httpstatuses.io/429) HTTP status

    code.


    ## Ban


    I reserve myself the right to ban from using the API anyone who might use it
    in an abusive fashion. In such cases,

    all requests will return a [423](https://httpstatuses.io/423) HTTP status
    code.


    ## Cache


    Some resources are subject to server-side caching (i.e you'll not
    necessarily get the most up-to-date data from the

    server). Check their respective documentation for more information.


    ## HTTP status codes


    The HTTP response status code must be used to check if the sent request was
    successfully handled or not:


    - `2xx` Everything is OK. The response body will contain whatever the
    resource provide (check its doc)


    - `4xx` Something is wrong on the client side (e.g an input parameter
    validation error)


    - `5xx` There were a server error


    ::: note

    The RWRS REST API doesn't provide internal error codes, but tries to make a
    meaningful use of HTTP status codes instead.

    :::


    ## Input & output data format


    Everything is [JSON](https://en.wikipedia.org/wiki/JSON) along a
    `Content-Type` HTTP header of `application/json`.


    ### Success (2xx)


    The output can be different regarding the resource. Check their respective
    doc.


    ### Client error (4xx)


    Typically an input parameters validation error:


    ```json

    {
        "message": {
            "blow": "Missing required parameter in the JSON body",
            "hey": "Missing required parameter in the JSON body"
        }
    }

    ```


    In this case the `hey` and `blow` input parameters are missing.


    If a query string parameter is missing or invalid, it's the same output:


    ```json

    {
        "message": {
            "active": "Missing required parameter in the query string"
        }
    }

    ```


    May also happen in other cases, e.g when the requested resource wasn't
    found:


    ```json

    {
        "message": "This thing does not exists."
    }

    ```


    ### Server error (5xx)


    They should not happen (exception for [503](https://httpstatuses.io/503)).
    If so, please [get in touch](https://rwrstats.com/feedback).


    Example:


    ```json

    {
        "message": "Error creating this thing: IndexError: out of bounds"
    }

    ```
host: rwrstats.com
basePath: /api
schemes:
  - https
paths:
  /servers:
    get:
      responses:
        '200':
          description: An empty list is returned if no Servers were found.
          headers: {}
          examples:
            application/json:
              - name: InvasionEU2
                ip: 31.186.250.67
                port: 1235
                is_ranked: true
                is_official: true
                website_url: https://runningwithrifles.com/
                url: https://rwrstats.com/servers/31.186.250.67:1235/invasioneu2
                type:
                  id: vanilla
                  name: Vanilla
                mode:
                  id: COOP
                  name: Coop.
                database:
                  id: invasion
                  name: Invasion
                map:
                  id: map10
                  name: Railroad Gap
                players:
                  current: 20
                  max: 24
                  free: 4
                location:
                  name: Frankfurt am Main, Germany
                  country_code: de
                  flag_image_url: https://rwrstats.com/static/images/flags/DE.png
                steam_join_url: >-
                  steam://rungameid/270150//server_address=178.32.58.160
                  server_port=1240
                event:
                  name: PvP event!
                  is_ongoing: true
                  starts_at: '2019-04-16T16:00:00+02:00'
                has_friends: true
          schema:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  description: Server name
                ip:
                  type: string
                  description: Server IP address
                port:
                  type: number
                  description: Server port
                is_ranked:
                  type: boolean
                  description: >-
                    Whether this server is a ranked one (official Invasion and
                    WW2 DLCs servers only)
                is_official:
                  type: boolean
                  description: >-
                    Whether this server is an official one (official Invasion,
                    WW2 DLCs or Dominance servers)
                website_url:
                  type:
                    - string
                    - 'null'
                  description: Server website URL. `null` if none
                  default: 'null'
                url:
                  type: string
                  description: RWRS server page URL
                type:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Server type ID (used mod or DLC)
                    name:
                      type: string
                      description: Server type name (used mod or DLC)
                  required:
                    - id
                    - name
                  description: Server type
                mode:
                  type:
                    - object
                    - 'null'
                  properties:
                    id:
                      type: string
                      description: Server mode ID (game mode)
                    name:
                      type: string
                      description: Server mode name (game mode)
                  required:
                    - id
                    - name
                  description: Server mode. `null` if unknown
                database:
                  type:
                    - object
                    - 'null'
                  properties:
                    id:
                      type: string
                      description: The database ID
                    name:
                      type: string
                      description: The database name
                  required:
                    - id
                    - name
                  description: >-
                    Server used database. `null` if not an official Invasion or
                    WW2 DLCs server
                map:
                  type: object
                  properties:
                    id:
                      type: string
                      description: >-
                        Map ID. **Not unique**: must be used in conjonction of
                        the mode ID
                    name:
                      type: string
                      description: Map name. If unknown, `id` will be used
                  required:
                    - id
                    - name
                  description: Server map
                players:
                  type: object
                  properties:
                    current:
                      type: number
                      description: Number of current players
                    max:
                      type: number
                      description: Maximum allowed number of players
                    free:
                      type: number
                      description: Number of free player slots
                  required:
                    - current
                    - max
                    - free
                  description: Server players
                location:
                  type:
                    - object
                    - 'null'
                  properties:
                    name:
                      type: string
                      description: >-
                        City name (if available) + country name of the server
                        location
                    country_code:
                      type: string
                      description: >-
                        [ISO 3166-1
                        alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)
                        country code of the server location
                    flag_image_url:
                      type: string
                      description: Image URL of the server country location. 24x24 pixels
                  required:
                    - name
                    - country_code
                    - flag_image_url
                  description: Server location. `null` if unknown
                steam_join_url:
                  type: string
                  description: >-
                    [Steam browser
                    protocol](https://developer.valvesoftware.com/wiki/Steam_browser_protocol)
                    URL to be used to load Running With Rifles onto the given
                    server lobby screen
                event:
                  type:
                    - object
                    - 'null'
                  properties:
                    name:
                      type: string
                      description: Event name
                    is_ongoing:
                      type: boolean
                      description: Whether this event is ongoing or not
                    starts_at:
                      type: string
                      description: >-
                        [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) date
                        when this event will start
                  required:
                    - name
                    - is_ongoing
                    - starts_at
                  description: Event linked to this Server. `null` if none
                has_friends:
                  type: boolean
                  description: >-
                    Whether there's friends from the current user playing on
                    this server
              required:
                - name
                - ip
                - port
                - is_ranked
                - is_official
                - url
                - type
                - map
                - players
                - steam_join_url
                - has_friends
        '400':
          description: >-
            One or more arguments are (is) invalid. Check the error message(s)
            for more information.
          headers: {}
          examples:
            application/json:
              message: Example error message
          schema:
            type: object
            properties:
              message:
                type: string
                description: The error message explaining what happened
            required:
              - message
            additionalProperties: false
        '403':
          description: Invalid Personal Access Token or Personal Access Token not provided.
          headers: {}
          examples:
            application/json:
              message: Example error message
          schema:
            type: object
            properties:
              message:
                type: string
                description: The error message explaining what happened
            required:
              - message
            additionalProperties: false
        '503':
          description: Maintenance in progress.
          headers: {}
          examples:
            application/json:
              message: Example error message
          schema:
            type: object
            properties:
              message:
                type: string
                description: The error message explaining what happened
            required:
              - message
            additionalProperties: false
      summary: Get the list of Servers
      operationId: Get the list of Servers
      description: >-
        Return the list of Servers. The list may be optionally filtered by
        several criteria. These last are taken into account

        **only** if it they are present in the query string.


        ::: note


        #### Server-side caching


        This resource has a cache lifetime of **1 minute**.

        :::
      tags:
        - Servers
      parameters:
        - name: location
          in: query
          description: >-

            Servers country or continent of residence. This criterion format is
            either:


            - A concatenation of a **location type** and a **location code**,
            separated by a colon, OR


            - A single **country code**, OR


            - A list of any of the two above, separated by a `+`, OR


            - `any`


            Available **location types** are:


            - `continent`


            - `country`


            Available **continent codes**:


            - `af` - Africa


            - `na` - North America


            - `oc` - Oceania


            - `an` - Antarctica (_who knows!_)


            - `as` - Asia


            - `eu` - Europe


            - `sa` - South America


            **Country code** must conform to [ISO 3166-1
            alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2).


            Examples:


            - A continent: `continent:eu`


            - A country: `country:fr`


            - A country: `de`


            - Two continents: `continent:eu+continent:na`


            - Two countries: `country:fr+country:de`


            - Two countries: `jp+country:cn`


            - A country and a continent: `fr+continent:na`


            - A country and a continent: `country:fr+continent:na`


            ::: note

            **Don't forget to URL-encode values given to this criterion!**


            Possible values and examples are shown unencoded for clarity
            purpose, but you **must** URL-encode these so

            it's properly parsed by the server, e.g the last example would be
            `country%3Afr%2Bcountry%3Ade`.

            :::
          required: false
          x-example: continent:eu
          type: string
          default: any
        - name: map
          in: query
          description: >-

            Servers map ID.


            See [this
            file](https://github.com/EpocDotFr/rwrs/blob/master/data/maps.json),
            part of the RWRS source code,

            for a complete list of allowed map IDs.
          required: false
          x-example: map10
          type: string
          default: any
        - name: type
          in: query
          description: >-

            Servers type (used mod or DLC). This criterion format is either:


            - A single type, OR


            - A list of types, separated by a `+`, OR


            - `any`


            Examples:


            - Single type: `pacific`


            - Two types: `pacific+edelweiss`


            ::: note

            **Don't forget to URL-encode values given to this criterion!**


            Possible values and examples are shown unencoded for clarity
            purpose, but you **must** URL-encode these so

            it's properly parsed by the server, e.g the last example would be
            `pacific%2Bedelweiss`.

            :::
          required: false
          x-example: vanilla
          type: string
          default: any
          enum:
            - any
            - vanilla
            - vanilla.winter
            - vanilla.desert
            - pvp
            - pacific
            - edelweiss
            - man_vs_world_mp
            - man_vs_zombies_mp
            - Running_with_the_Dead
            - ww2_undead
            - overlord_defense
            - lab_defense
            - lab_def_koth
            - viper
            - casus_belli_05
            - Running_in_the_Bug_War
            - soldiers_at_war_heavy
            - SUPERHOT
            - superhotrailroad
            - snd
            - running_from_exterminatus
        - name: mode
          in: query
          description: Servers mode (game mode).
          required: false
          x-example: COOP
          type: string
          default: any
          enum:
            - any
            - COOP
            - DOM
            - PvP
            - PvE
            - PvPvE
        - name: dedicated
          in: query
          description: >-
            Whether to filter dedicated servers only. `true` or `1` to enable
            this filter. `false` or `0` will be ignored and thus disable this
            filter.
          required: false
          x-example: 'true'
          type: string
          enum:
            - 'true'
            - '1'
            - 'false'
            - '0'
        - name: official
          in: query
          description: >-
            Whether to filter official servers only. `true` or `1` to enable
            this filter. `false` or `0` will be ignored and thus disable this
            filter.
          required: false
          x-example: 'true'
          type: string
          enum:
            - 'true'
            - '1'
            - 'false'
            - '0'
        - name: not_empty
          in: query
          description: >-
            Whether to filter non-empty servers only. `true` or `1` to enable
            this filter. `false` or `0` will be ignored and thus disable this
            filter.
          required: false
          x-example: 'true'
          type: string
          enum:
            - 'true'
            - '1'
            - 'false'
            - '0'
        - name: not_full
          in: query
          description: >-
            Whether to filter non-full servers only. `true` or `1` to enable
            this filter. `false` or `0` will be ignored and thus disable this
            filter.
          required: false
          x-example: 'true'
          type: string
          enum:
            - 'true'
            - '1'
            - 'false'
            - '0'
        - name: limit
          in: query
          description: Return the _n_ first servers of the filtered list.
          required: false
          x-example: '10'
          type: number
      produces:
        - application/json
      consumes: []
  /servers/{ip}:{port}:
    get:
      responses:
        '200':
          description: OK
          headers: {}
          examples:
            application/json:
              name: InvasionEU2
              ip: 31.186.250.67
              port: 1235
              is_ranked: true
              is_official: true
              website_url: https://runningwithrifles.com/
              url: https://rwrstats.com/servers/31.186.250.67:1235/invasioneu2
              type:
                id: vanilla
                name: Vanilla
              mode:
                id: COOP
                name: Coop.
                name_long: Cooperation
              database:
                id: invasion
                name: Invasion
              map:
                id: map10
                name: Railroad Gap
                preview_image_url: >-
                  https://rwrstats.com/static/images/maps/preview/vanilla/map10.png
                minimap_image_url: >-
                  https://rwrstats.com/static/images/maps/minimap/vanilla/map10.png
              players:
                current: 20
                max: 24
                free: 4
                list:
                  - username: EPOCDOTFR
                    url: https://rwrstats.com/players/invasion/EPOCDOTFR
                    is_rwrs_creator: true
                    is_contributor: false
                    is_rwr_dev: false
                    is_official_servers_mod: false
                    database:
                      id: invasion
                      name: Invasion
                    is_friend: true
              location:
                name: Frankfurt am Main, Germany
                country_code: de
                flag_image_url: https://rwrstats.com/static/images/flags/DE.png
              steam_join_url: >-
                steam://rungameid/270150//server_address=178.32.58.160
                server_port=1240
              event:
                name: PvP event!
                is_ongoing: true
                starts_at: '2019-04-16T16:00:00+02:00'
              version: 1.70.2
              is_dedicated: true
              comment: Coop campaign
              bots: 104
              banner_image_url: >-
                https://rwrstats.com/static/images/servers/106.14.208.129-1234.png
          schema:
            type: object
            properties:
              name:
                type: string
                description: Server name
              ip:
                type: string
                description: Server IP address
              port:
                type: number
                description: Server port
              is_ranked:
                type: boolean
                description: >-
                  Whether this server is a ranked one (official Invasion and WW2
                  DLCs servers only)
              is_official:
                type: boolean
                description: >-
                  Whether this server is an official one (official Invasion, WW2
                  DLCs or Dominance servers)
              website_url:
                type:
                  - string
                  - 'null'
                description: Server website URL. `null` if none
                default: 'null'
              url:
                type: string
                description: RWRS server page URL
              type:
                type: object
                properties:
                  id:
                    type: string
                    description: Server type ID (used mod or DLC)
                  name:
                    type: string
                    description: Server type name (used mod or DLC)
                required:
                  - id
                  - name
                description: Server type
              mode:
                type:
                  - object
                  - 'null'
                properties:
                  id:
                    type: string
                    description: Server mode ID (game mode)
                  name:
                    type: string
                    description: Server mode name (game mode)
                  name_long:
                    type:
                      - string
                      - 'null'
                    description: Long server mode name (game mode). `null` if unknown
                    default: 'null'
                required:
                  - id
                  - name
                description: Server mode. `null` if unknown
              database:
                type:
                  - object
                  - 'null'
                properties:
                  id:
                    type: string
                    description: The database ID
                  name:
                    type: string
                    description: The database name
                required:
                  - id
                  - name
                description: >-
                  Server used database. `null` if not an official Invasion or
                  WW2 DLCs server
              map:
                type: object
                properties:
                  id:
                    type: string
                    description: >-
                      Map ID. **Not unique**: must be used in conjonction of the
                      mode ID
                  name:
                    type: string
                    description: Map name. If unknown, `id` will be used
                  preview_image_url:
                    type:
                      - string
                      - 'null'
                    description: >-
                      Map preview image URL (ingame screenshot). `null` if none
                      available. Size may vary
                    default: 'null'
                  minimap_image_url:
                    type:
                      - string
                      - 'null'
                    description: >-
                      Mapview image URL. `null` if none available. 2048x2048
                      pixels
                    default: 'null'
                required:
                  - id
                  - name
                description: Server map
              players:
                type: object
                properties:
                  current:
                    type: number
                    description: Number of current players
                  max:
                    type: number
                    description: Maximum allowed number of players
                  free:
                    type: number
                    description: Number of free player slots
                  list:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                          description: Player username
                        url:
                          type:
                            - string
                            - 'null'
                          description: >-
                            RWRS player profile page URL. `null` if the player
                            isn't an official Invasion or WW2 DLCs profile
                          default: 'null'
                        is_rwrs_creator:
                          type: boolean
                          description: Whether this player is the creator of RWRS
                        is_contributor:
                          type: boolean
                          description: >-
                            Whether this player contributed in a way or another
                            to RWRS
                        is_rwr_dev:
                          type: boolean
                          description: Whether this player is one of the RWR developers
                        is_official_servers_mod:
                          type: boolean
                          description: Whether this player is moderator on official servers
                        database:
                          type:
                            - object
                            - 'null'
                          properties:
                            id:
                              type: string
                              description: The database ID
                            name:
                              type: string
                              description: The database name
                          required:
                            - id
                            - name
                          description: >-
                            Player database. `null` if not an official Invasion
                            or WW2 DLCs player profile
                        is_friend:
                          type: boolean
                          description: Whether this player is friend with the current user
                      required:
                        - username
                        - is_rwrs_creator
                        - is_contributor
                        - is_rwr_dev
                        - is_official_servers_mod
                        - is_friend
                    description: List of current players
                required:
                  - current
                  - max
                  - free
                  - list
                description: Server players
              location:
                type:
                  - object
                  - 'null'
                properties:
                  name:
                    type: string
                    description: >-
                      City name (if available) + country name of the server
                      location
                  country_code:
                    type: string
                    description: >-
                      [ISO 3166-1
                      alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)
                      country code of the server location
                  flag_image_url:
                    type: string
                    description: Image URL of the server country location. 24x24 pixels
                required:
                  - name
                  - country_code
                  - flag_image_url
                description: Server location. `null` if unknown
              steam_join_url:
                type: string
                description: >-
                  [Steam browser
                  protocol](https://developer.valvesoftware.com/wiki/Steam_browser_protocol)
                  URL to be used to load Running With Rifles onto the given
                  server lobby screen
              event:
                type:
                  - object
                  - 'null'
                properties:
                  name:
                    type: string
                    description: Event name
                  is_ongoing:
                    type: boolean
                    description: Whether this event is ongoing or not
                  starts_at:
                    type: string
                    description: >-
                      [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) date
                      when this event will start
                required:
                  - name
                  - is_ongoing
                  - starts_at
                description: Event linked to this Server. `null` if none
              version:
                type: string
                description: Server game version
              is_dedicated:
                type: boolean
                description: Whether this server is a dedicated one
              comment:
                type:
                  - string
                  - 'null'
                description: Server comment. `null` if none
                default: 'null'
              bots:
                type: number
                description: Number of current bots
              banner_image_url:
                type:
                  - string
                  - 'null'
                description: >-
                  Server banner image URL. Only available for dedicated servers.
                  485x95 pixels
                default: 'null'
            required:
              - name
              - ip
              - port
              - is_ranked
              - is_official
              - website_url
              - url
              - type
              - mode
              - database
              - map
              - players
              - location
              - steam_join_url
              - event
              - version
              - is_dedicated
              - comment
              - bots
              - banner_image_url
            additionalProperties: false
        '400':
          description: >-
            One or more arguments are (is) invalid. Check the error message(s)
            for more information.
          headers: {}
          examples:
            application/json:
              message: Example error message
          schema:
            type: object
            properties:
              message:
                type: string
                description: The error message explaining what happened
            required:
              - message
            additionalProperties: false
        '403':
          description: Invalid Personal Access Token or Personal Access Token not provided.
          headers: {}
          examples:
            application/json:
              message: Example error message
          schema:
            type: object
            properties:
              message:
                type: string
                description: The error message explaining what happened
            required:
              - message
            additionalProperties: false
        '404':
          description: The Server wasn't found.
          headers: {}
          examples:
            application/json:
              message: Example error message
          schema:
