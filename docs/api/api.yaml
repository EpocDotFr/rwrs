definitions:
  Database Object:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        example: invasion
        description: The database ID
      name:
        type: string
        example: Invasion
        description: The database name
  Event Object:
    type: object
    required:
      - name
      - is_ongoing
      - starts_at
    properties:
      name:
        type: string
        example: PvP event!
        description: Event name
      is_ongoing:
        type: boolean
        example: true
        description: Whether this event is ongoing or not
      starts_at:
        type: string
        example: '2019-04-16T16:00:00+02:00'
        description: >-
          [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) date when this
          event will start
  Error Response:
    type: object
    required:
      - message
    properties:
      message:
        type: string
        example: Example error message
        description: The error message explaining what happened
  User Country Object:
    type: object
    required:
      - name
      - code
      - flag_image_url
    properties:
      name:
        type: string
        example: France
        description: User country name
      code:
        type: string
        example: fr
        description: >-
          [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)
          user country code
      flag_image_url:
        type: string
        example: https://rwrstats.com/static/images/flags/FR.png
        description: Image URL of the user country. 24x24 pixels
  User Simple Object:
    type: object
    required:
      - id
      - username
      - url
      - steam_id
      - steam_profile_url
    properties:
      id:
        type: number
        example: 56
        description: RWRS user ID
      username:
        type: string
        example: Epoc
        description: The user nickname (as provided by Steam)
      url:
        type: string
        example: https://rwrstats.com/users/56/epoc
        description: RWRS user profile page URL
      steam_id:
        type: number
        example: 76561198051750940
        description: SteamID64 of this user
      steam_profile_url:
        type: string
        example: https://steamcommunity.com/profiles/76561198051750940
        description: URL to this Steam user profile page
      small_avatar_url:
        type:
          - string
          - 'null'
        example: >-
          https://steamcdn-a.akamaihd.net/steamcommunity/public/images/avatars/18/18a19ee73965fb3b92f39db8a307df80f5624122.jpg
        description: User small avatar (as provided by Steam). 32x32 pixels
      large_avatar_url:
        type:
          - string
          - 'null'
        example: >-
          https://steamcdn-a.akamaihd.net/steamcommunity/public/images/avatars/18/18a19ee73965fb3b92f39db8a307df80f5624122_full.jpg
        description: User large avatar (as provided by Steam). 184x184 pixels
  User Full Object:
    allOf:
      - $ref: '#/definitions/User Simple Object'
      - type: object
        required:
          - registered_at
        properties:
          registered_at:
            type: string
            example: '2019-02-22T10:46:00+00:00'
            description: >-
              [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) date / time
              when user registered on RWRS
          country:
            oneOf:
              - $ref: '#/definitions/User Country Object'
                description: 'If not `null`: user country (as provided by Steam)'
              - type: 'null'
          accounts:
            type: array
            items:
              $ref: '#/definitions/Player Intermediate Object'
            description: List of linked RWR accounts
  Player Stats Object:
    type: object
    required:
      - kills
      - deaths
      - score
      - kd_ratio
      - time_played
      - longest_kill_streak
      - targets_destroyed
      - vehicles_destroyed
      - soldiers_healed
      - teamkills
      - distance_moved
      - shots_fired
      - throwables_thrown
      - xp
    properties:
      kills:
        type: number
        example: 38689
        description: Number of soldiers killed
      deaths:
        type: number
        example: 3695
        description: Number of times being killed
      score:
        type: number
        example: 34994
        description: Score as shown in-game (kills minus deaths)
      kd_ratio:
        type: number
        example: 10.47
        description: Kills / deaths ratio. The higher above 1.0, the better
      time_played:
        type: number
        example: 640200
        description: Number of seconds played online
      longest_kill_streak:
        type: number
        example: 301
        description: Maximum number of consecutive kills without a single death
      targets_destroyed:
        type: number
        example: 633
        description: Number of structures destroyed (radars, prisons, etc)
      vehicles_destroyed:
        type: number
        example: 638
        description: Number of vehicles destroyed
      soldiers_healed:
        type: number
        example: 31
        description: Number of soldiers healed
      teamkills:
        type: number
        example: 785
        description: Number of friendly soldiers killed
      distance_moved:
        type: number
        example: 790.4
        description: Number of kilometers traveled (includes vehicles use)
      shots_fired:
        type: number
        example: 417868
        description: Number of bullets fired (includes static weapons, tank turrets, etc)
      throwables_thrown:
        type: number
        example: 3057
        description: Number of grenades, C4s, etc thrown
      xp:
        type: number
        example: 219921
        description: Current number of experience points
  Player Rank Object:
    type: object
    required:
      - id
      - name
      - required_xp
      - image_url
      - icon_url
    properties:
      id:
        type: number
        example: 14
        description: Rank ID
      name:
        type: string
        example: Lieutenant General
        description: Rank name
      required_xp:
        type: number
        example: 200000
        description: Number of experience points this rank requires to be promoted to
      image_url:
        type: string
        example: https://rwrstats.com/static/images/ranks/us/14.png
        description: Rank image URL. 64x64 pixels
      icon_url:
        type: string
        example: https://rwrstats.com/static/images/ranks/us/14_icon.png
        description: Small rank image URL. 20x20 pixels
  Player Base Object:
    type: object
    required:
      - username
      - is_rwrs_creator
      - is_contributor
      - is_rwr_dev
      - is_official_servers_mod
    properties:
      username:
        type: string
        example: EPOCDOTFR
        description: Player username
      url:
        type:
          - string
          - 'null'
        example: https://rwrstats.com/players/invasion/EPOCDOTFR
        description: >-
          RWRS player profile page URL. `null` if the player isn't an official
          Invasion or WW2 DLCs profile
      is_rwrs_creator:
        type: boolean
        example: true
        description: Whether this player is the creator of RWRS
      is_contributor:
        type: boolean
        description: Whether this player contributed in a way or another to RWRS
      is_rwr_dev:
        type: boolean
        description: Whether this player is one of the RWR developers
      is_official_servers_mod:
        type: boolean
        description: Whether this player is moderator on official servers
      database:
        oneOf:
          - $ref: '#/definitions/Database Object'
            description: >-
              Player database. `null` if not an official Invasion or WW2 DLCs
              player profile
          - type: 'null'
  Player Simple Object:
    allOf:
      - $ref: '#/definitions/Player Base Object'
      - type: object
        required:
          - is_friend
        properties:
          is_friend:
            type: boolean
            example: true
            description: Whether this player is friend with the current user
  Player Intermediate Object:
    allOf:
      - $ref: '#/definitions/Player Simple Object'
      - type: object
        properties:
          current_server:
            oneOf:
              - $ref: '#/definitions/Server Base Object'
                description: Server on which the player is currently playing
              - type: 'null'
  Player Advanced Object:
    allOf:
      - $ref: '#/definitions/Player Intermediate Object'
      - type: object
        required:
          - stats
          - current_rank
        properties:
          stats:
            $ref: '#/definitions/Player Stats Object'
            description: Player statistics
          current_rank:
            $ref: '#/definitions/Player Rank Object'
            description: Player current rank
  Player List Object:
    allOf:
      - $ref: '#/definitions/Player Advanced Object'
      - type: object
        required:
          - position
        properties:
          position:
            type: number
            example: 42
            description: Position on the leaderboard
  Player Stats History Object:
    allOf:
      - $ref: '#/definitions/Player Stats Object'
      - type: object
        properties:
          date:
            type: string
            example: '2018-11-30'
            description: >-
              [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) date when stats
              have been recorded
          promoted_to_rank:
            oneOf:
              - $ref: '#/definitions/Player Rank Object'
                description: 'If not `null`: rank this player has been promoted to'
              - type: 'null'
  Player Full Object:
    allOf:
      - $ref: '#/definitions/Player Advanced Object'
      - type: object
        properties:
          next_rank:
            oneOf:
              - $ref: '#/definitions/Player Rank Object'
                description: Player next rank (if applicable)
              - type: 'null'
          xp_to_next_rank:
            type: number
            example: 280079
            description: Number of experience points to gain until the next promotion
          xp_percent_completion_to_next_rank:
            type: number
            example: 43.98
            description: Percentage of experience points to gain until the next promotion
          date:
            type:
              - string
              - 'null'
            example: '2018-11-30'
            description: >-
              If not `null`: [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601)
              date for which this player date are available for (stats history
              mode only)
          signature_image_url:
            type:
              - string
              - 'null'
            example: https://rwrstats.com/static/images/players/EPOCDOTFR-invasion.png
            description: Player signature image URL. 387x108 pixels
          promoted_to_rank:
            oneOf:
              - $ref: '#/definitions/Player Rank Object'
                description: >-
                  If not `null`: rank this player has been promoted to (stats
                  history mode only)
              - type: 'null'
          owner:
            oneOf:
              - $ref: '#/definitions/User Simple Object'
                description: >-
                  The RWRS user that owns this RWR account or `null` if he's
                  unknown or if the RWRS user has defined its profile as private
              - type: 'null'
  Friend Object:
    allOf:
      - $ref: '#/definitions/Player Base Object'
      - type: object
        required:
          - friend_since
        properties:
          current_server:
            oneOf:
              - $ref: '#/definitions/Server Base Object'
                description: Server on which the player is currently playing
              - type: 'null'
          friend_since:
            type: string
            example: '2019-02-22T10:46:00+00:00'
            description: >-
              [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) date / time
              since the current user is friend with this player
  Server Map Simple Object:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        example: map10
        description: 'Map ID. **Not unique**: must be used in conjonction of the mode ID'
      name:
        type: string
        example: Railroad Gap
        description: Map name. If unknown, `id` will be used
  Server Map Full Object:
    allOf:
      - $ref: '#/definitions/Server Map Simple Object'
      - type: object
        properties:
          preview_image_url:
            type:
              - string
              - 'null'
            example: https://rwrstats.com/static/images/maps/preview/vanilla/map10.png
            description: >-
              Map preview image URL (ingame screenshot). `null` if none
              available. Size may vary
          minimap_image_url:
            type:
              - string
              - 'null'
            example: https://rwrstats.com/static/images/maps/minimap/vanilla/map10.png
            description: Mapview image URL. `null` if none available. 2048x2048 pixels
  Server Location Object:
    type: object
    required:
      - name
      - country_code
      - flag_image_url
    properties:
      name:
        type: string
        example: Frankfurt am Main, Germany
        description: City name (if available) + country name of the server location
      country_code:
        type: string
        example: de
        description: >-
          [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)
          country code of the server location
      flag_image_url:
        type: string
        example: https://rwrstats.com/static/images/flags/DE.png
        description: Image URL of the server country location. 24x24 pixels
  Server Type Object:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        example: vanilla
        description: Server type ID (used mod or DLC)
      name:
        type: string
        example: Vanilla
        description: Server type name (used mod or DLC)
  Server Mode Simple Object:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        example: COOP
        description: Server mode ID (game mode)
      name:
        type: string
        example: Coop.
        description: Server mode name (game mode)
  Server Mode Full Object:
    allOf:
      - $ref: '#/definitions/Server Mode Simple Object'
      - type: object
        properties:
          name_long:
            type:
              - string
              - 'null'
            example: Cooperation
            description: Long server mode name (game mode). `null` if unknown
  Server Players Simple Object:
    type: object
    required:
      - current
      - max
      - free
    properties:
      current:
        type: number
        example: 20
        description: Number of current players
      max:
        type: number
        example: 24
        description: Maximum allowed number of players
      free:
        type: number
        example: 4
        description: Number of free player slots
  Server Players Full Object:
    allOf:
      - $ref: '#/definitions/Server Players Simple Object'
      - type: object
        required:
          - list
        properties:
          list:
            type: array
            items:
              $ref: '#/definitions/Player Simple Object'
            description: List of current players
  Server Base Object:
    type: object
    required:
      - name
      - ip
      - port
      - is_ranked
      - is_official
      - url
      - type
      - map
      - players
      - steam_join_url
    properties:
      name:
        type: string
        example: InvasionEU2
        description: Server name
      ip:
        type: string
        example: 31.186.250.67
        description: Server IP address
      port:
        type: number
        example: 1235
        description: Server port
      is_ranked:
        type: boolean
        example: true
        description: >-
          Whether this server is a ranked one (official Invasion and WW2 DLCs
          servers only)
      is_official:
        type: boolean
        example: true
        description: >-
          Whether this server is an official one (official Invasion, WW2 DLCs or
          Dominance servers)
      website_url:
        type:
          - string
          - 'null'
        example: https://runningwithrifles.com/
        description: Server website URL. `null` if none
      url:
        type: string
        example: https://rwrstats.com/servers/31.186.250.67:1235/invasioneu2
        description: RWRS server page URL
      type:
        $ref: '#/definitions/Server Type Object'
        description: Server type
      mode:
        oneOf:
          - $ref: '#/definitions/Server Mode Simple Object'
            description: Server mode. `null` if unknown
          - type: 'null'
      database:
        oneOf:
          - $ref: '#/definitions/Database Object'
            description: >-
              Server used database. `null` if not an official Invasion or WW2
              DLCs server
          - type: 'null'
      map:
        $ref: '#/definitions/Server Map Simple Object'
        description: Server map
      players:
        $ref: '#/definitions/Server Players Simple Object'
        description: Server players
      location:
        oneOf:
          - $ref: '#/definitions/Server Location Object'
            description: Server location. `null` if unknown
          - type: 'null'
      steam_join_url:
        type: string
        example: >-
          steam://rungameid/270150//server_address=178.32.58.160
          server_port=1240
        description: >-
          [Steam browser
          protocol](https://developer.valvesoftware.com/wiki/Steam_browser_protocol)
          URL to be used to load Running With Rifles onto the given server lobby
          screen
      event:
        oneOf:
          - $ref: '#/definitions/Event Object'
            description: Event linked to this Server. `null` if none
          - type: 'null'
  Server Simple Object:
    allOf:
      - $ref: '#/definitions/Server Base Object'
      - type: object
        required:
          - has_friends
        properties:
          has_friends:
            type: boolean
            example: true
            description: >-
              Whether there's friends from the current user playing on this
              server
  Server Full Object:
    allOf:
      - $ref: '#/definitions/Server Base Object'
      - type: object
        required:
          - map
          - version
          - is_dedicated
          - bots
          - players
        properties:
          map:
            $ref: '#/definitions/Server Map Full Object'
            description: Server map
          version:
            type: string
            example: 1.70.2
            description: Server game version
          is_dedicated:
            type: boolean
            example: true
            description: Whether this server is a dedicated one
          comment:
            type:
              - string
              - 'null'
            example: Coop campaign
            description: Server comment. `null` if none
          bots:
            type: number
            example: 104
            description: Number of current bots
          mode:
            oneOf:
              - $ref: '#/definitions/Server Mode Full Object'
                description: Server mode. `null` if unknown
              - type: 'null'
          players:
            $ref: '#/definitions/Server Players Full Object'
            description: Server players
          banner_image_url:
            type:
              - string
              - 'null'
            example: https://rwrstats.com/static/images/servers/106.14.208.129-1234.png
            description: >-
              Server banner image URL. Only available for dedicated servers.
              485x95 pixels
  Map Counters Object:
    type: object
    required:
      - players
      - servers
    properties:
      players:
        type: object
        required:
          - total
          - online
          - friends_online
        properties:
          total:
            type: number
            example: 85
            description: Total number of people playing RWR
          online:
            type: number
            example: 32
            description: Number of people playing RWR multiplayer online
          friends_online:
            type: number
            example: 12
            description: Number of current user's friends playing RWR multiplayer online
        description: Player counts
      servers:
        type: object
        required:
          - total
          - active
        properties:
          total:
            type: number
            example: 22
            description: Total number of public RWR servers
          active:
            type: number
            example: 7
            description: Number of active (non-empty) public RWR servers
        description: Player counts
  Servers: {}
  Server: {}
  Players: {}
  Player: {}
  Friends: {}
  Friend: {}
  User: {}
  Live counters: {}
securityDefinitions: {}
tags:
  - name: Servers
    description: A Server represent a public multiplayer Running With Rifles game.
  - name: Players
    description: >-
      A Player represent an online multiplayer Running With Rifles account on
      official Invasion or WW2 DLCs servers.


      ::: note

      **Important note**


      Players stats are updated daily and **only** concerns official Invasion
      and WW2 DLCs servers.


      Also, stats history is only recorded for the 5000 most experienced
      players.

      :::
  - name: Friends
    description: >-
      A Friend is an online multiplayer Running With Rifles account which is
      existing in the current user's friends list.
  - name: Users
    description: A User represent a RWRS user, created after the User signed-in via Steam.
  - name: Misc
    description: Miscellanous resources.
